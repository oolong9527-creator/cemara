<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>大頭照拍攝</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="大頭照" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- 拍攝畫面 -->
    <div id="camera-view">
      <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
        <div id="hud">
          <div id="hud-top"><span id="app-title">PORTRAIT</span></div>
          <div id="guide-area">
            <div id="guide-oval"></div>
            <p id="guide-text">將臉部對準框內</p>
          </div>
          <div id="hud-bottom"></div>
        </div>
      </div>
      <div id="camera-controls">
        <button id="btn-flip" title="切換鏡頭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <button id="btn-capture"><span id="shutter-inner"></span></button>
        <div id="btn-placeholder"></div>
      </div>
    </div>

    <!-- 預覽 + 編輯畫面 -->
    <div id="preview-view" class="hidden">
      <div id="preview-header">
        <button id="btn-retake" class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          重拍
        </button>
        <span id="preview-title">編輯</span>
        <button id="btn-download" class="header-btn accent">儲存</button>
      </div>

      <div id="preview-wrapper">
        <canvas id="canvas"></canvas>
      </div>

      <div id="edit-panel">

        <div class="edit-row">
          <span class="edit-row-label">背景</span>
          <div class="pills-row">
            <button class="pill active" data-bg="original">原色</button>
            <button class="pill" data-bg="white">白底</button>
          </div>
          <div id="seg-loading" class="hidden">
            <span class="spinner"></span>
            <span id="seg-status">處理中...</span>
          </div>
        </div>

        <div class="edit-row">
          <span class="edit-row-label">磨皮</span>
          <input type="range" id="sl-smooth" min="0" max="100" value="0" />
          <span class="slider-val" id="val-smooth">0</span>
        </div>

        <div class="edit-row">
          <span class="edit-row-label">亮度</span>
          <input type="range" id="sl-brightness" min="-50" max="50" value="0" />
          <span class="slider-val" id="val-brightness">0</span>
        </div>

        <div class="edit-row">
          <span class="edit-row-label">色溫</span>
          <input type="range" id="sl-warmth" min="-50" max="50" value="0" />
          <span class="slider-val" id="val-warmth">0</span>
        </div>

        <div class="edit-row">
          <span class="edit-row-label">格式</span>
          <div class="pills-row">
            <button class="pill active" data-fmt="jpeg">JPG</button>
            <button class="pill" data-fmt="png">PNG</button>
            <button class="pill" data-fmt="webp">WebP</button>
          </div>
        </div>

        <div class="edit-row edit-row-last">
          <span class="edit-row-label">尺寸</span>
          <div class="pills-col">
            <div class="pills-row">
              <button class="pill active" data-size="2inch">2吋 35×45mm</button>
              <button class="pill" data-size="1200">M 1200px</button>
            </div>
            <div class="pills-row">
              <button class="pill" data-size="2000">L 2000px</button>
              <button class="pill" data-size="0">原始</button>
            </div>
            <p class="option-hint">2吋 = 護照・身分證・駕照用規格</p>
          </div>
        </div>

      </div>
    </div>

    <!-- 錯誤畫面 -->
    <div id="error-view" class="hidden">
      <div id="error-box">
        <div id="error-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p id="error-msg"></p>
        <button id="btn-retry" class="primary">重試</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/cemara/sw.js');
  </script>
</body>
</html>
