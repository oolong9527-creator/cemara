<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>大頭照拍攝</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>大頭照拍攝</h1>
    </header>

    <!-- 拍攝畫面 -->
    <div id="camera-view">
      <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide-overlay">
          <div id="guide-oval"></div>
          <p id="guide-text">將臉部對準橢圓框內</p>
        </div>
      </div>

      <div id="camera-controls">
        <button id="btn-flip" title="切換鏡頭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <button id="btn-capture">
          <span id="shutter-ring"></span>
          <span id="shutter-dot"></span>
        </button>
        <button id="btn-placeholder" disabled></button>
      </div>
    </div>

    <!-- 預覽畫面 -->
    <div id="preview-view" class="hidden">
      <div id="preview-wrapper">
        <canvas id="canvas"></canvas>
      </div>

      <div id="preview-controls">
        <button id="btn-retake" class="secondary">重新拍攝</button>
        <button id="btn-download" class="primary">儲存照片</button>
      </div>
    </div>

    <!-- 錯誤提示 -->
    <div id="error-view" class="hidden">
      <div id="error-box">
        <p id="error-msg"></p>
        <button id="btn-retry" class="primary">重試</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
