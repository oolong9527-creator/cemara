<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>產生 Icon</title></head>
<body>
<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size / 512;

  // 背景 — 深藍近黑
  ctx.fillStyle = '#0d1117';
  roundRect(ctx, 0, 0, size, size, 108 * s);
  ctx.fill();

  // 細線筆觸
  const lw = 18 * s;
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.90)';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 人像外框（圓角矩形）
  const fx = 130 * s, fy = 90 * s, fw = 252 * s, fh = 320 * s, fr = 36 * s;
  ctx.beginPath();
  ctx.moveTo(fx + fr, fy);
  ctx.lineTo(fx + fw - fr, fy);
  ctx.quadraticCurveTo(fx + fw, fy, fx + fw, fy + fr);
  ctx.lineTo(fx + fw, fy + fh - fr);
  ctx.quadraticCurveTo(fx + fw, fy + fh, fx + fw - fr, fy + fh);
  ctx.lineTo(fx + fr, fy + fh);
  ctx.quadraticCurveTo(fx, fy + fh, fx, fy + fh - fr);
  ctx.lineTo(fx, fy + fr);
  ctx.quadraticCurveTo(fx, fy, fx + fr, fy);
  ctx.closePath();
  ctx.stroke();

  // 頭部（圓形）
  ctx.beginPath();
  ctx.arc(256 * s, 228 * s, 60 * s, 0, Math.PI * 2);
  ctx.stroke();

  // 肩膀弧線
  const sy2 = 358 * s;
  ctx.beginPath();
  ctx.moveTo(148 * s, sy2);
  ctx.quadraticCurveTo(256 * s, 300 * s, 364 * s, sy2);
  ctx.stroke();

  // 底部小橫線 — 相片裁切提示
  ctx.strokeStyle = 'rgba(79, 142, 247, 0.85)';
  ctx.lineWidth = 14 * s;
  ctx.lineCap = 'round';
  const bly = 448 * s;
  ctx.beginPath();
  ctx.moveTo(196 * s, bly);
  ctx.lineTo(316 * s, bly);
  ctx.stroke();

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

download(drawIcon(192), 'icon-192.png');
setTimeout(() => download(drawIcon(512), 'icon-512.png'), 800);

document.body.innerHTML = '<p style="font-family:sans-serif;padding:40px;font-size:1.1rem">✅ 正在下載 icon-192.png 和 icon-512.png，請將它們放入 headshot-app 資料夾（覆蓋舊檔）。</p>';
</script>
</body>
</html>
